# Dependabot — supply-chain gate (spec §10.8).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Expo/React Native packages must move together with the Expo SDK
      # (via `npx expo install`) — individual major bumps break the runtime
      # even when CI passes, since CI never boots Metro or the native app.
      - dependency-name: 'expo*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@expo/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'babel-preset-expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
