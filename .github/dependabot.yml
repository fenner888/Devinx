# Dependabot — supply-chain gate (spec §10.8).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Expo/React Native packages must move together with the Expo SDK
      # (via `npx expo install --fix`) — ANY independent bump of a native
      # module can mismatch Expo Go's embedded native code, and CI can't
      # catch it because it never boots the native runtime. All update
      # types blocked, not just majors.
      - dependency-name: 'expo*'
      - dependency-name: '@expo/*'
      - dependency-name: 'babel-preset-expo'
      - dependency-name: 'react-native*'
      - dependency-name: '@react-native-community/*'
      - dependency-name: '@react-native/*'
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
