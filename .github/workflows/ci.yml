name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies (lockfile-enforced, spec §10.8)
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --ci --reporters=default

      - name: Build (typecheck gate)
        run: npm run build

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Key-leak grep gate (§10.1)
        run: |
          # git grep exit codes: 0 = match (leak), 1 = clean, >=2 = scan error.
          # Treat scan errors as failures — the gate must never fail open.
          fail=0
          scan() {
            local desc="$1"; shift
            local status=0
            git grep -iEn "$@" || status=$?
            if [ "$status" -eq 0 ]; then
              echo "::error::$desc"
              fail=1
            elif [ "$status" -ge 2 ]; then
              echo "::error::scan error (exit $status) while checking: $desc"
              fail=1
            fi
          }

          # No real cog_ keys (cog_ followed by 8+ alphanumerics) in ANY tracked
          # file (src, tests, specs, config). Allowlisted: diagnostics.ts (scrubber
          # regex) and two test files with deliberately fake cog_test fixtures.
          scan "Potential real API key found in tracked files" \
            'cog_[A-Za-z0-9]{8,}' -- '.' \
            ':!src/lib/diagnostics.ts' \
            ':!tests/auth/wipe.test.ts' \
            ':!tests/lib/sentry-scrub.test.ts'

          # No key variable names outside /src/auth (with documented allowlist).
          scan "Secret-adjacent variable outside /src/auth" \
            '\b(apiKey|api_key|apiSecret|api_secret|password|passwd)\b\s*[=:(]' -- 'src' \
            ':!src/auth' ':!src/lib/branding.ts' ':!src/lib/diagnostics.ts' \
            ':!src/api/devin/schemas.ts' ':!src/api/devin/types.ts' \
            ':!src/store/preferences.ts' ':!src/app/(onboarding)'

          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "Key-leak gate passed."
